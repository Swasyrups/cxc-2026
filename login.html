<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — CxC 2026</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="assets/images/cxc-logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,700;0,800;0,900;1,700;1,800;1,900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/portal.css" />
</head>
<body>

<div class="login-card" id="loginCard">

  <img src="assets/images/cxc-logo.png" alt="CxC 2026" class="login-logo" />
  
  <!-- ── Step 1: Email ─────────────────────────── -->
  <div id="step-email">
    <h2>Welcome back</h2>
    <p>Enter your registered email. We'll send you a 6-digit code.</p>

    <div class="form-group">
      <label for="loginEmail">Email address</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" />
    </div>

    <div class="error-msg" id="emailError"></div>

    <button class="btn-primary" id="sendOtpBtn" onclick="sendOtp()">
      Send Code →
    </button>
  </div>

  <!-- ── Step 2: OTP ───────────────────────────── -->
  <div id="step-otp">
    <h2>Check your email</h2>
    <p id="otpSubtext">
  We sent an email to <strong id="sentTo"></strong>.<br/>
  <span style="color:#666;font-size:0.85rem;">
   Enter the 6-digit code below.
  </span>
</p>

    <div class="otp-inputs" id="otpInputs">
      <input type="text" maxlength="1" inputmode="numeric" />
      <input type="text" maxlength="1" inputmode="numeric" />
      <input type="text" maxlength="1" inputmode="numeric" />
      <input type="text" maxlength="1" inputmode="numeric" />
      <input type="text" maxlength="1" inputmode="numeric" />
      <input type="text" maxlength="1" inputmode="numeric" />
    </div>

    <div class="error-msg" id="otpError"></div>
    <div class="success-msg" id="otpSuccess"></div>

    <button class="btn-primary" id="verifyOtpBtn" onclick="verifyOtp()">
      Verify & Log In →
    </button>

    <p style="margin-top:12px;font-size:0.85rem;color:#888;">
      Didn't get it? <button class="resend-link" id="resendBtn" onclick="resendOtp()">Resend code</button>
    </p>

    <p style="margin-top:8px;font-size:0.85rem;">
      <a href="#" onclick="goBack()">← Use a different email</a>
    </p>
  </div>

  <div class="login-footer">
    New here? <a href="index.html">Register FREE →</a>
  </div>

</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL      = 'https://ftduvppcdjanupoudzvi.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0ZHV2cHBjZGphbnVwb3VkenZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NDcwNTMsImV4cCI6MjA5NzQyMzA1M30.HibCpa3_CKojK-hUw5b0PGI6UK8LKdOVI0KUxXZn82w';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentEmail = '';

  // ── OTP input navigation ──────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    const inputs = document.querySelectorAll('.otp-inputs input');
    inputs.forEach((input, i) => {
      input.addEventListener('input', () => {
        if (input.value && i < inputs.length - 1) inputs[i + 1].focus();
        if (getOtpValue().length === 6) verifyOtp();
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && i > 0) inputs[i - 1].focus();
      });
      input.addEventListener('paste', (e) => {
        const paste = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
        paste.split('').forEach((char, j) => { if (inputs[j]) inputs[j].value = char; });
        if (inputs[paste.length - 1]) inputs[paste.length - 1].focus();
        e.preventDefault();
      });
    });

    // Check if already logged in → redirect
    sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'submit.html';
    });
  });

  function getOtpValue() {
    return [...document.querySelectorAll('.otp-inputs input')].map(i => i.value).join('');
  }

  // ── Send OTP ──────────────────────────────────
  async function sendOtp() {
    const email = document.getElementById('loginEmail').value.trim().toLowerCase();
    const errEl = document.getElementById('emailError');
    const btn   = document.getElementById('sendOtpBtn');

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showMsg(errEl, 'Enter a valid email address.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Sending…';
    hideMsg(errEl);

    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { shouldCreateUser: false } // only existing users
    });

    if (error) {
      showMsg(errEl, error.message.includes('not found')
        ? 'This email isn\'t registered. <a href="index.html">Register here →</a>'
        : error.message);
      btn.disabled = false;
      btn.textContent = 'Send Code →';
      return;
    }

    currentEmail = email;
    document.getElementById('sentTo').textContent = email;
    document.getElementById('step-email').style.display = 'none';
    document.getElementById('step-otp').style.display = 'block';
    document.querySelector('.otp-inputs input').focus();

    startResendTimer();
  }

  // ── Verify OTP ────────────────────────────────
  async function verifyOtp() {
    const token  = getOtpValue();
    const errEl  = document.getElementById('otpError');
    const succEl = document.getElementById('otpSuccess');
    const btn    = document.getElementById('verifyOtpBtn');

    if (token.length < 6) {
      showMsg(errEl, 'Enter the full 6-digit code.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Verifying…';
    hideMsg(errEl);

    const { error } = await sb.auth.verifyOtp({
      email: currentEmail,
      token,
      type: 'email'
    });

    if (error) {
      showMsg(errEl, 'Invalid or expired code. Try again.');
      btn.disabled = false;
      btn.textContent = 'Verify & Log In →';
      document.querySelectorAll('.otp-inputs input').forEach(i => i.value = '');
      document.querySelector('.otp-inputs input').focus();
      return;
    }

    showMsg(succEl, 'Logged in! Taking you to your dashboard…');
    setTimeout(() => { window.location.href = 'submit.html'; }, 1000);
  }

  // ── Resend ────────────────────────────────────
  async function resendOtp() {
    await sendOtpToEmail(currentEmail);
    startResendTimer();
  }

  async function sendOtpToEmail(email) {
    await sb.auth.signInWithOtp({ email, options: { shouldCreateUser: false } });
  }

  function startResendTimer() {
    const btn = document.getElementById('resendBtn');
    let secs = 30;
    btn.disabled = true;
    btn.textContent = `Resend in ${secs}s`;
    const t = setInterval(() => {
      secs--;
      btn.textContent = secs > 0 ? `Resend in ${secs}s` : 'Resend code';
      if (secs <= 0) { clearInterval(t); btn.disabled = false; }
    }, 1000);
  }

  function goBack() {
    document.getElementById('step-otp').style.display = 'none';
    document.getElementById('step-email').style.display = 'block';
    document.getElementById('sendOtpBtn').disabled = false;
    document.getElementById('sendOtpBtn').textContent = 'Send Code →';
  }

  function showMsg(el, msg) { el.innerHTML = msg; el.style.display = 'block'; }
  function hideMsg(el) { el.style.display = 'none'; }
</script>

</body>
</html>
